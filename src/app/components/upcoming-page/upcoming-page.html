@if (!activeEvent()) {
  <div class="flex items-center justify-center flex-col pt-20">
    <p class="p-4 text-slate-500">No upcoming events</p>
    <button matButton="elevated" (click)="createEvent((events().length + 1).toString())">
      Create Event
    </button>
  </div>
} @else {
  <div class="flex items-center justify-between">
    <p>Class {{ activeEvent()?.name }}: {{ activeEvent()?.date?.format('D MMM YYYY') }}</p>
    <div class="flex gap-4 items-center">
      <p>{{ countCheckedIn() }} / {{ activeEvent()?.attendees?.length }}</p>
      <button matButton="elevated" size="small" (click)="saveEvent()">Save</button>
    </div>
  </div>
  @for (user of activeEvent()?.attendees; track user.id) {
    <app-user-check-in [user]="user" [userNo]="$index + 1" />
  }
}
