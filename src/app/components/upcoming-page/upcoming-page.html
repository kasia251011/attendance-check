@if (!getActiveEvent()) {
  <div class="flex items-center justify-center flex-col pt-20">
    <p class="p-4 text-slate-500">No upcoming events</p>
    <button matButton="elevated" (click)="createEvent('Elo')">Create Event</button>
  </div>
}

@if (getActiveEvent()) {
  @for (user of getActiveEvent()?.attendees; track user.id) {
    <app-user-check-in [user]="user" [userNo]="$index + 1"></app-user-check-in>
  }
}
